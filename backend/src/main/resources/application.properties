# ─── Server ───────────────────────────────────────────────────────────────────
server.port=8080

# ─── Database (H2 in-memory for local dev) ────────────────────────────────────
# Switch to PostgreSQL by setting SPRING_PROFILES_ACTIVE=prod and filling application-prod.properties
spring.datasource.url=jdbc:h2:mem:trackitdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ─── JPA ──────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ─── JWT ──────────────────────────────────────────────────────────────────────
# Change this secret before deploying to production (min 32 chars)
app.jwt.secret=trackit-super-secret-key-for-jwt-signing-2024
app.jwt.expiration=86400000

# ─── ML Service ───────────────────────────────────────────────────────────────
app.ml.url=http://localhost:8000

# ─── CORS ─────────────────────────────────────────────────────────────────────
app.cors.allowed-origins=http://localhost:3000,http://127.0.0.1:5500,http://localhost:5500,https://justtrackit.vercel.app
